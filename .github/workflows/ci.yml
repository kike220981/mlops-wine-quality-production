name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx
        
    - name: Prepare Data and Model
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # Ejecutamos en orden lógico de MLOps[cite: 1, 2]
        python src/data/ingesta.py
        python src/data/preprocesamiento.py
        python src/models/entrenamiento.py
        
    - name: Run Tests with Coverage
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # Forzamos la cobertura al 70% como pide Federico
        pytest --cov=src tests/ --cov-fail-under=70
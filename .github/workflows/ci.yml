name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx  # httpx es necesario para TestClient en FastAPI
        
    - name: Prepare Data and Model for Tests
      run: |
        # Generamos los archivos necesarios para que los tests no fallen[cite: 1]
        python src/data/ingesta.py
        python src/data/preprocesamiento.py
        python src/models/entrenamiento.py
        
    - name: Run Tests with Coverage
      run: |
        # Ejecutamos con el umbral del 70% exigido
        pytest --cov=src tests/ --cov-fail-under=70
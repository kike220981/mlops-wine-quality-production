version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000

  # Bonus para el 10: MLflow local para ver tus experimentos[cite: 1, 2]
  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0